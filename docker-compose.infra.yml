name: yuiju-infra

services:
  mongodb:
    image: mongo:7
    container_name: yuiju-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - yuiju-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yuiju-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - yuiju-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  yuiju-mongodb-data:
  yuiju-redis-data:
